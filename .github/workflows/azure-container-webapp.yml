name: Build and deploy a container to an Azure Web App

env:
  AZURE_WEBAPP_NAME: 'appwebpy'

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login no Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login no ACR
        run: az acr login --name contnrbm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase the repo name and username
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Build Docker
        run: |
          docker build -t contnrbm-hjfbaec7e6gsdefq.azurecr.io .

      - name: Push Docker
        run: |
          docker push contnrbm-hjfbaec7e6gsdefq.azurecr.io

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Login Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

